services:
  # Web API
  - type: web
    name: neeti-ai-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SUPABASE
        value: "True"
      - key: USE_OLLAMA
        value: "False"
      - key: USE_LOCAL_WHISPER
        value: "False"
      - key: USE_LOCAL_STORAGE
        value: "True"
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LIVEKIT_WS_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      # Set this to your Supabase "direct connection" string (Session mode, port 5432)
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # Celery Worker (agents + sessions)
  - type: worker
    name: neeti-ai-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info -Q agents,sessions --concurrency=4
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DATABASE_URL
        fromService:
          name: neeti-ai-backend
          envVarKey: DATABASE_URL
      - key: SUPABASE_URL
        fromService:
          name: neeti-ai-backend
          envVarKey: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromService:
          name: neeti-ai-backend
          envVarKey: SUPABASE_SERVICE_ROLE_KEY

  # Celery Beat (scheduler)
  - type: worker
    name: neeti-ai-beat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DATABASE_URL
        fromService:
          name: neeti-ai-backend
          envVarKey: DATABASE_URL
